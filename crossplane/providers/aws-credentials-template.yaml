# ABOUTME: AWS credentials template for Crossplane provider authentication
# ABOUTME: Copy this file, populate with real credentials, and apply (NEVER commit real credentials!)

# SECURITY WARNING:
# This is a TEMPLATE file. Do NOT commit actual credentials to Git!
# The .gitignore is configured to ignore *-credentials.yaml files

---
# Step 1: Create AWS credentials file
# Save your AWS credentials in INI format:
#
# cat > /tmp/aws-credentials.txt <<EOF
# [default]
# aws_access_key_id = YOUR_ACCESS_KEY_ID
# aws_secret_access_key = YOUR_SECRET_ACCESS_KEY
# EOF

---
# Step 2: Create Kubernetes secret from credentials file
# kubectl create secret generic aws-credentials \
#   -n crossplane-system \
#   --from-file=credentials=/tmp/aws-credentials.txt

---
# Step 3: Verify secret was created
# kubectl get secret aws-credentials -n crossplane-system

---
# Alternative: Create secret directly (less secure - visible in shell history)
# kubectl create secret generic aws-credentials \
#   -n crossplane-system \
#   --from-literal=credentials="[default]
# aws_access_key_id = YOUR_ACCESS_KEY_ID
# aws_secret_access_key = YOUR_SECRET_ACCESS_KEY"

---
# For production: Use AWS IAM Roles for Service Accounts (IRSA)
# This eliminates the need for static credentials
#
# apiVersion: aws.upbound.io/v1beta1
# kind: ProviderConfig
# metadata:
#   name: default
# spec:
#   credentials:
#     source: InjectedIdentity
#   assumeRoleARN: arn:aws:iam::123456789012:role/crossplane-provider-role
