# ABOUTME: GCP credentials template for Crossplane provider authentication
# ABOUTME: Copy this file, populate with real service account key, and apply (NEVER commit real credentials!)

# SECURITY WARNING:
# This is a TEMPLATE file. Do NOT commit actual credentials to Git!
# The .gitignore is configured to ignore *-credentials.yaml files

---
# Step 1: Create GCP service account with required permissions
# gcloud iam service-accounts create crossplane-provider \
#   --display-name="Crossplane Provider Service Account"

---
# Step 2: Grant necessary roles to service account
# PROJECT_ID=your-project-id
# SA_EMAIL=crossplane-provider@${PROJECT_ID}.iam.gserviceaccount.com
#
# gcloud projects add-iam-policy-binding ${PROJECT_ID} \
#   --member="serviceAccount:${SA_EMAIL}" \
#   --role="roles/storage.admin"
#
# gcloud projects add-iam-policy-binding ${PROJECT_ID} \
#   --member="serviceAccount:${SA_EMAIL}" \
#   --role="roles/cloudsql.admin"
#
# gcloud projects add-iam-policy-binding ${PROJECT_ID} \
#   --member="serviceAccount:${SA_EMAIL}" \
#   --role="roles/compute.admin"
#
# gcloud projects add-iam-policy-binding ${PROJECT_ID} \
#   --member="serviceAccount:${SA_EMAIL}" \
#   --role="roles/redis.admin"

---
# Step 3: Create and download service account key
# gcloud iam service-accounts keys create /tmp/gcp-credentials.json \
#   --iam-account=${SA_EMAIL}

---
# Step 4: Create Kubernetes secret from service account key
# kubectl create secret generic gcp-credentials \
#   -n crossplane-system \
#   --from-file=credentials=/tmp/gcp-credentials.json

---
# Step 5: Update ProviderConfig with your GCP project ID
# Edit crossplane/providers/gcp-provider.yaml and replace:
# projectID: YOUR_GCP_PROJECT_ID
# with your actual project ID

---
# Step 6: Verify secret was created
# kubectl get secret gcp-credentials -n crossplane-system

---
# Step 7: Clean up local credentials file (security best practice)
# rm /tmp/gcp-credentials.json

---
# For production: Use Workload Identity
# This eliminates the need for service account keys
#
# apiVersion: gcp.upbound.io/v1beta1
# kind: ProviderConfig
# metadata:
#   name: default
# spec:
#   projectID: your-project-id
#   credentials:
#     source: InjectedIdentity
