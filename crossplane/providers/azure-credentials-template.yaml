# ABOUTME: Azure credentials template for Crossplane provider authentication
# ABOUTME: Copy this file, populate with real service principal, and apply (NEVER commit real credentials!)

# SECURITY WARNING:
# This is a TEMPLATE file. Do NOT commit actual credentials to Git!
# The .gitignore is configured to ignore *-credentials.yaml files

---
# Step 1: Create Azure service principal
# az ad sp create-for-rbac \
#   --name crossplane-provider \
#   --role Contributor \
#   --scopes /subscriptions/YOUR_SUBSCRIPTION_ID \
#   --sdk-auth > /tmp/azure-credentials.json

---
# Step 2: The output will look like this (EXAMPLE - DO NOT USE):
# {
#   "clientId": "00000000-0000-0000-0000-000000000000",
#   "clientSecret": "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx",
#   "subscriptionId": "00000000-0000-0000-0000-000000000000",
#   "tenantId": "00000000-0000-0000-0000-000000000000",
#   "activeDirectoryEndpointUrl": "https://login.microsoftonline.com",
#   "resourceManagerEndpointUrl": "https://management.azure.com/",
#   "activeDirectoryGraphResourceId": "https://graph.windows.net/",
#   "sqlManagementEndpointUrl": "https://management.core.windows.net:8443/",
#   "galleryEndpointUrl": "https://gallery.azure.com/",
#   "managementEndpointUrl": "https://management.core.windows.net/"
# }

---
# Step 3: Create Kubernetes secret from service principal
# kubectl create secret generic azure-credentials \
#   -n crossplane-system \
#   --from-file=credentials=/tmp/azure-credentials.json

---
# Alternative: Create secret from individual values
# kubectl create secret generic azure-credentials \
#   -n crossplane-system \
#   --from-literal=credentials='{
#     "clientId": "YOUR_CLIENT_ID",
#     "clientSecret": "YOUR_CLIENT_SECRET",
#     "subscriptionId": "YOUR_SUBSCRIPTION_ID",
#     "tenantId": "YOUR_TENANT_ID"
#   }'

---
# Step 4: Assign additional permissions if needed
# For specific resource types, grant appropriate roles:
#
# # Storage
# az role assignment create \
#   --assignee YOUR_CLIENT_ID \
#   --role "Storage Account Contributor" \
#   --scope /subscriptions/YOUR_SUBSCRIPTION_ID
#
# # SQL
# az role assignment create \
#   --assignee YOUR_CLIENT_ID \
#   --role "SQL DB Contributor" \
#   --scope /subscriptions/YOUR_SUBSCRIPTION_ID
#
# # Redis Cache
# az role assignment create \
#   --assignee YOUR_CLIENT_ID \
#   --role "Redis Cache Contributor" \
#   --scope /subscriptions/YOUR_SUBSCRIPTION_ID

---
# Step 5: Verify secret was created
# kubectl get secret azure-credentials -n crossplane-system

---
# Step 6: Clean up local credentials file (security best practice)
# rm /tmp/azure-credentials.json

---
# For production: Use Managed Identity
# This eliminates the need for service principal credentials
#
# apiVersion: azure.upbound.io/v1beta1
# kind: ProviderConfig
# metadata:
#   name: default
# spec:
#   credentials:
#     source: InjectedIdentity
