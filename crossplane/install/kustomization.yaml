# ABOUTME: Crossplane installation using Kustomize with composition functions
# ABOUTME: Uses Crossplane v2.2.0 (latest stable as of April 2026) - CNCF Graduated project

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: crossplane-system

resources:
  # Crossplane v2.2.0 - CNCF Graduated project
  # v2 requires Pipeline mode for compositions (native PnT removed)
  - https://raw.githubusercontent.com/crossplane/crossplane/v2.2.0/cluster/crds/crossplane.yaml
  - https://raw.githubusercontent.com/crossplane/crossplane/v2.2.0/cluster/deployment/deployment.yaml

# Configuration patches for Crossplane deployment
patchesStrategicMerge:
  - crossplane-deployment-patch.yaml

# Labels for resource tracking
commonLabels:
  app.kubernetes.io/part-of: backend-first-idp
  app.kubernetes.io/component: infrastructure-provisioning
  managed-by: kustomize
  tutorial: kubecon-eu-2026

# Annotations for documentation
commonAnnotations:
  kubecon.tutorial/phase: "1-infrastructure-control-plane"
  kubecon.tutorial/component: "crossplane-core"
  documentation: "https://github.com/peopleforrester/2026_Kubecon_Europe_CNCF_Portal_Fatigue_IDP_Tutorial"
