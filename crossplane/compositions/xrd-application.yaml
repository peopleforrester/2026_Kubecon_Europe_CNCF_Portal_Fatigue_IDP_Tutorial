# ABOUTME: Application XRD - the ultimate abstraction for full-stack provisioning
# ABOUTME: Single resource that provisions infrastructure dependencies and wires to deployment

apiVersion: apiextensions.crossplane.io/v1
kind: CompositeResourceDefinition
metadata:
  name: xapplications.platform.io
  annotations:
    kubecon.tutorial/description: "Application-centric infrastructure provisioning"
    kubecon.tutorial/phase: "8"
    kubecon.tutorial/impact: "Ultimate abstraction - one resource = full stack"
spec:
  group: platform.io
  names:
    kind: XApplication
    plural: xapplications
  claimNames:
    kind: Application
    plural: applications

  # Connection secrets include all dependency credentials
  connectionSecretKeys:
    - database-endpoint
    - database-port
    - database-username
    - database-password
    - database-name
    - cache-endpoint
    - cache-port
    - cache-auth-token
    - storage-bucket
    - storage-region
    - storage-endpoint

  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                # Application metadata
                application:
                  type: object
                  properties:
                    name:
                      type: string
                      description: "Application name"
                    team:
                      type: string
                      description: "Team owning this application"
                    tier:
                      type: string
                      enum: [free, standard, premium, enterprise]
                      default: standard
                      description: "Application tier (affects resource sizing)"
                  required: [name]

                # Infrastructure dependencies
                dependencies:
                  type: object
                  properties:
                    database:
                      type: object
                      properties:
                        enabled:
                          type: boolean
                          default: false
                        type:
                          type: string
                          enum: [postgres, mysql]
                          default: postgres
                        size:
                          type: string
                          enum: [small, medium, large]
                          default: small
                        storageGB:
                          type: integer
                          minimum: 20
                          maximum: 1000
                          default: 20
                        highAvailability:
                          type: boolean
                          default: false

                    cache:
                      type: object
                      properties:
                        enabled:
                          type: boolean
                          default: false
                        type:
                          type: string
                          enum: [redis, memcached]
                          default: redis
                        size:
                          type: string
                          enum: [small, medium, large]
                          default: small
                        highAvailability:
                          type: boolean
                          default: false

                    storage:
                      type: object
                      properties:
                        enabled:
                          type: boolean
                          default: false
                        type:
                          type: string
                          enum: [s3, gcs, azure-blob]
                          default: s3
                        versioning:
                          type: boolean
                          default: true
                        lifecycle:
                          type: boolean
                          default: false

                # Deployment configuration
                deployment:
                  type: object
                  properties:
                    image:
                      type: string
                      description: "Container image"
                    tag:
                      type: string
                      default: latest
                      description: "Image tag"
                    replicas:
                      type: integer
                      minimum: 1
                      maximum: 100
                      default: 3
                      description: "Number of replicas"
                    port:
                      type: integer
                      minimum: 1
                      maximum: 65535
                      default: 8080
                      description: "Container port"
                    resources:
                      type: object
                      properties:
                        cpu:
                          type: string
                          default: "100m"
                        memory:
                          type: string
                          default: "128Mi"

                    # Health checks
                    healthCheck:
                      type: object
                      properties:
                        enabled:
                          type: boolean
                          default: true
                        path:
                          type: string
                          default: "/health"
                        initialDelaySeconds:
                          type: integer
                          default: 30

                    # Auto-scaling
                    autoscaling:
                      type: object
                      properties:
                        enabled:
                          type: boolean
                          default: false
                        minReplicas:
                          type: integer
                          minimum: 1
                          default: 2
                        maxReplicas:
                          type: integer
                          minimum: 1
                          default: 10
                        targetCPU:
                          type: integer
                          minimum: 1
                          maximum: 100
                          default: 80

                # Service exposure
                service:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                      default: true
                    type:
                      type: string
                      enum: [ClusterIP, LoadBalancer, NodePort]
                      default: ClusterIP
                    annotations:
                      type: object
                      x-kubernetes-preserve-unknown-fields: true

                # Ingress configuration
                ingress:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                      default: false
                    host:
                      type: string
                      description: "Ingress hostname"
                    tls:
                      type: boolean
                      default: true
                      description: "Enable TLS"
                    annotations:
                      type: object
                      x-kubernetes-preserve-unknown-fields: true

                # Environment variables (non-secret)
                env:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      value:
                        type: string
                    required: [name, value]

                # Provider configuration
                provider:
                  type: string
                  enum: [aws, gcp, azure]
                  default: aws
                  description: "Cloud provider"

                region:
                  type: string
                  default: eu-west-1
                  description: "Cloud region"

              required:
                - application
                - deployment

            status:
              type: object
              properties:
                # Provisioning status
                phase:
                  type: string
                  enum: [Pending, Provisioning, Ready, Failed]
                  description: "Current provisioning phase"

                # Dependency status
                dependencies:
                  type: object
                  properties:
                    database:
                      type: object
                      properties:
                        ready:
                          type: boolean
                        endpoint:
                          type: string
                    cache:
                      type: object
                      properties:
                        ready:
                          type: boolean
                        endpoint:
                          type: string
                    storage:
                      type: object
                      properties:
                        ready:
                          type: boolean
                        bucket:
                          type: string

                # Deployment status
                deploymentStatus:
                  type: object
                  properties:
                    ready:
                      type: boolean
                    availableReplicas:
                      type: integer
                    desiredReplicas:
                      type: integer

                # Access information
                access:
                  type: object
                  properties:
                    serviceUrl:
                      type: string
                    ingressUrl:
                      type: string

                # Cost estimation
                estimatedCost:
                  type: object
                  properties:
                    monthly:
                      type: string
                    breakdown:
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
