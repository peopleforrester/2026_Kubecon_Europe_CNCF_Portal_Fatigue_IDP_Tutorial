# ABOUTME: ArgoCD installation using Kustomize with security-focused patches
# ABOUTME: Uses ArgoCD v3.3.6 (latest stable as of April 2026)

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: argocd

resources:
  # ArgoCD v3.3.6 - CNCF Graduated project
  # Using specific version for tutorial stability
  - https://raw.githubusercontent.com/argoproj/argo-cd/v3.3.6/manifests/install.yaml

patchesStrategicMerge:
  # Customize ArgoCD server for tutorial access
  - argocd-server-patch.yaml
  # Configure ArgoCD behavior and settings
  - argocd-cm-patch.yaml

# Labels for resource tracking
commonLabels:
  app.kubernetes.io/part-of: backend-first-idp
  managed-by: kustomize
  tutorial: kubecon-eu-2026

# Annotations for documentation
commonAnnotations:
  kubecon.tutorial/phase: "1-infrastructure-control-plane"
  kubecon.tutorial/component: "gitops-orchestration"
  documentation: "https://github.com/[YOUR-ORG]/backend-first-idp"
