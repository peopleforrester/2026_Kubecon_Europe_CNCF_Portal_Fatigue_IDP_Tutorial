# ABOUTME: ArgoCD server configuration patch for tutorial accessibility
# ABOUTME: Uses LoadBalancer for easy access during 75-minute KubeCon tutorial

apiVersion: v1
kind: Service
metadata:
  name: argocd-server
  namespace: argocd
spec:
  # LoadBalancer for tutorial simplicity
  # For production, use Ingress with TLS
  type: LoadBalancer
  ports:
  - name: http
    port: 80
    protocol: TCP
    targetPort: 8080
  - name: https
    port: 443
    protocol: TCP
    targetPort: 8080
  selector:
    app.kubernetes.io/name: argocd-server
---
# ArgoCD Server Deployment patch for tutorial mode
apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-server
  namespace: argocd
spec:
  template:
    spec:
      containers:
      - name: argocd-server
        # Enable insecure mode for tutorial (no TLS required)
        # WARNING: For production, always use TLS
        command:
        - argocd-server
        - --insecure
        - --staticassets
        - /shared/app
        # Resource limits for tutorial environment
        resources:
          limits:
            cpu: 500m
            memory: 256Mi
          requests:
            cpu: 250m
            memory: 128Mi
